name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Assemble static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css game.js _site/
          # iter-12 fix: ship the service worker and PWA manifest. Without
          # these the live page logged a 404 + console.error every load
          # because index.html registers `./service-worker.js` on boot.
          [ -f service-worker.js ] && cp service-worker.js _site/ || true
          [ -f manifest.json ] && cp manifest.json _site/ || true
          cp -r src _site/src
          if [ -d docs ]; then cp -r docs _site/docs; fi
          # Simple 404 fallback so deep-links to hash routes still load the game.
          cp index.html _site/404.html
          # Disable Jekyll processing on Pages.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
